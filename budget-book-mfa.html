<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Book — Verify Email</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:            #F8F7F5;
    --card:          #FFFFFF;
    --primary:       #3B7DD8;
    --primary-hover: #2C6BC4;
    --primary-light: rgba(59,125,216,0.08);
    --primary-ring:  rgba(59,125,216,0.13);
    --income:        #4CAF82;
    --income-light:  rgba(76,175,130,0.10);
    --expense:       #E07060;
    --expense-light: rgba(224,112,96,0.08);
    --text-1:        #1A1A2E;
    --text-2:        #6B7280;
    --text-3:        #9CA3AF;
    --border:        rgba(0,0,0,0.06);
    --border-solid:  #E8E8E6;
    --shadow-card:   0 2px 12px rgba(0,0,0,0.06);
    --shadow-lg:     0 8px 40px rgba(0,0,0,0.09), 0 1px 3px rgba(0,0,0,0.04);
    --font-display:  'Fraunces', Georgia, serif;
    --font-body:     'Plus Jakarta Sans', system-ui, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text-1);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* ─── Ambient background orbs ─── */
  .orb {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }
  .orb-1 {
    width: 620px; height: 620px;
    top: -18%; right: -12%;
    background: radial-gradient(circle, rgba(59,125,216,0.06) 0%, transparent 68%);
    animation: drift 18s ease-in-out infinite alternate;
  }
  .orb-2 {
    width: 500px; height: 500px;
    bottom: -20%; left: -8%;
    background: radial-gradient(circle, rgba(76,175,130,0.05) 0%, transparent 68%);
    animation: drift 22s ease-in-out infinite alternate-reverse;
  }
  .orb-3 {
    width: 300px; height: 300px;
    top: 50%; right: 6%;
    background: radial-gradient(circle, rgba(224,112,96,0.04) 0%, transparent 70%);
    animation: drift 15s ease-in-out infinite alternate;
  }
  @keyframes drift {
    0%   { transform: translate(0, 0) scale(1); }
    100% { transform: translate(-20px, -28px) scale(1.06); }
  }

  /* ─── Card container ─── */
  .card-wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 440px;
    padding: 24px;
  }

  .card {
    background: var(--card);
    border-radius: 24px;
    box-shadow: var(--shadow-lg);
    padding: 44px 40px 40px;
    text-align: center;
    position: relative;
    overflow: hidden;
    animation: cardIn 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
  }
  @keyframes cardIn {
    0%   { opacity: 0; transform: translateY(20px) scale(0.97); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Top gradient accent */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--primary), var(--income));
    border-radius: 24px 24px 0 0;
  }

  /* ─── Logo ─── */
  .logo {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    margin-bottom: 28px;
    animation: stagger 0.5s 0.08s cubic-bezier(0.22,1,0.36,1) both;
  }
  .logo-mark {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: var(--primary);
    display: flex; align-items: center; justify-content: center;
    color: #fff;
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 17px;
    line-height: 1;
    box-shadow: 0 2px 8px rgba(59,125,216,0.22);
  }
  .logo-text {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 19px;
    color: var(--text-1);
    letter-spacing: -0.02em;
  }

  /* ─── Email icon ring ─── */
  .icon-ring {
    width: 60px; height: 60px;
    border-radius: 50%;
    background: var(--primary-light);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    animation: stagger 0.5s 0.14s cubic-bezier(0.22,1,0.36,1) both;
    transition: background 0.4s, transform 0.4s;
  }
  .icon-ring svg {
    width: 26px; height: 26px;
    stroke: var(--primary);
    transition: stroke 0.4s;
  }

  /* ─── Success state for icon ring ─── */
  .icon-ring.success {
    background: var(--income-light);
    transform: scale(1.08);
  }
  .icon-ring.success svg { stroke: var(--income); }

  /* ─── Headings ─── */
  .heading {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 24px;
    color: var(--text-1);
    letter-spacing: -0.02em;
    margin-bottom: 6px;
    line-height: 1.3;
    animation: stagger 0.5s 0.18s cubic-bezier(0.22,1,0.36,1) both;
  }
  .subtitle {
    font-size: 14.5px;
    color: var(--text-2);
    line-height: 1.55;
    margin-bottom: 30px;
    animation: stagger 0.5s 0.22s cubic-bezier(0.22,1,0.36,1) both;
  }
  .email-hl {
    color: var(--primary);
    font-weight: 600;
  }

  @keyframes stagger {
    0%   { opacity: 0; transform: translateY(10px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* ─── OTP input row ─── */
  .otp-row {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
    animation: stagger 0.5s 0.28s cubic-bezier(0.22,1,0.36,1) both;
  }

  .otp-box {
    width: 52px; height: 62px;
    border: 2px solid var(--border-solid);
    border-radius: 14px;
    background: var(--bg);
    text-align: center;
    font-family: var(--font-body);
    font-size: 24px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: var(--text-1);
    outline: none;
    caret-color: var(--primary);
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s, transform 0.18s;
  }
  .otp-box::selection { background: var(--primary-light); }

  .otp-box:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3.5px var(--primary-ring);
    background: #fff;
    transform: scale(1.05);
  }
  .otp-box.filled {
    border-color: var(--primary);
    background: var(--primary-light);
  }
  .otp-box.filled:not(:focus) {
    box-shadow: none;
    transform: scale(1);
  }

  /* Error state */
  .otp-box.shake {
    border-color: var(--expense);
    box-shadow: 0 0 0 3.5px var(--expense-light);
    animation: shakeBox 0.45s ease-in-out;
  }
  @keyframes shakeBox {
    0%, 100% { transform: translateX(0); }
    15%      { transform: translateX(-5px); }
    30%      { transform: translateX(5px); }
    45%      { transform: translateX(-4px); }
    60%      { transform: translateX(4px); }
    75%      { transform: translateX(-2px); }
    90%      { transform: translateX(2px); }
  }

  /* Success state */
  .otp-box.verified {
    border-color: var(--income);
    background: var(--income-light);
    box-shadow: none;
    transform: scale(1);
  }

  /* ─── Inline error message ─── */
  .error-msg {
    font-size: 13px;
    color: var(--expense);
    margin-bottom: 18px;
    opacity: 0;
    transform: translateY(-4px);
    transition: opacity 0.25s, transform 0.25s;
    min-height: 20px;
  }
  .error-msg.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* ─── Verifying progress bar ─── */
  .progress-bar {
    width: 100%;
    height: 3px;
    background: var(--border-solid);
    border-radius: 999px;
    margin-bottom: 20px;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .progress-bar.active { opacity: 1; }
  .progress-bar-fill {
    height: 100%;
    width: 0;
    background: linear-gradient(90deg, var(--primary), var(--income));
    border-radius: 999px;
    transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .progress-bar.active .progress-bar-fill { width: 100%; }

  /* ─── Status text ─── */
  .status-text {
    font-size: 13px;
    color: var(--text-3);
    min-height: 20px;
    margin-bottom: 0;
    transition: color 0.3s;
  }
  .status-text.verifying { color: var(--primary); font-weight: 500; }
  .status-text.success-text { color: var(--income); font-weight: 600; }

  /* ─── Resend link ─── */
  .resend {
    font-size: 13.5px;
    color: var(--text-3);
    margin-top: 24px;
    animation: stagger 0.5s 0.36s cubic-bezier(0.22,1,0.36,1) both;
  }
  .resend a {
    color: var(--primary);
    font-weight: 600;
    text-decoration: none;
    cursor: pointer;
    transition: color 0.2s;
  }
  .resend a:hover { color: var(--primary-hover); text-decoration: underline; }

  /* ─── Back link ─── */
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 13px;
    color: var(--text-3);
    text-decoration: none;
    margin-top: 18px;
    transition: color 0.2s;
    animation: stagger 0.5s 0.4s cubic-bezier(0.22,1,0.36,1) both;
  }
  .back-link:hover { color: var(--text-2); }
  .back-link svg { width: 14px; height: 14px; transition: transform 0.2s; }
  .back-link:hover svg { transform: translateX(-2px); }

  /* ─── Success checkmark overlay ─── */
  .success-overlay {
    position: absolute;
    inset: 0;
    background: var(--card);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
    border-radius: 24px;
    z-index: 10;
  }
  .success-overlay.show {
    opacity: 1;
    pointer-events: auto;
  }

  .check-circle {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: var(--income-light);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 20px;
    transform: scale(0);
    transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .success-overlay.show .check-circle { transform: scale(1); }

  .check-circle svg {
    width: 34px; height: 34px;
    stroke: var(--income);
    stroke-dasharray: 50;
    stroke-dashoffset: 50;
    transition: stroke-dashoffset 0.5s 0.25s ease;
  }
  .success-overlay.show .check-circle svg { stroke-dashoffset: 0; }

  .success-heading {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 22px;
    color: var(--text-1);
    letter-spacing: -0.02em;
    margin-bottom: 6px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.4s 0.4s, transform 0.4s 0.4s;
  }
  .success-overlay.show .success-heading { opacity: 1; transform: translateY(0); }

  .success-sub {
    font-size: 14px;
    color: var(--text-2);
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.4s 0.5s, transform 0.4s 0.5s;
  }
  .success-overlay.show .success-sub { opacity: 1; transform: translateY(0); }

  .redirect-note {
    font-size: 12px;
    color: var(--text-3);
    margin-top: 16px;
    opacity: 0;
    transition: opacity 0.4s 0.7s;
  }
  .success-overlay.show .redirect-note { opacity: 1; }

  /* ─── Responsive ─── */
  @media (max-width: 480px) {
    .card { padding: 36px 24px 32px; }
    .heading { font-size: 21px; }
    .otp-box { width: 44px; height: 54px; font-size: 20px; }
    .otp-row { gap: 7px; }
  }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="card-wrap">
  <div class="card" id="card">

    <!-- Success overlay (hidden by default) -->
    <div class="success-overlay" id="success-overlay">
      <div class="check-circle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <div class="success-heading">You're verified!</div>
      <div class="success-sub">Redirecting to your dashboard…</div>
      <div class="redirect-note">Taking you there now</div>
    </div>

    <!-- Logo -->
    <div class="logo">
      <div class="logo-mark">B</div>
      <div class="logo-text">Budget Book</div>
    </div>

    <!-- Icon -->
    <div class="icon-ring" id="icon-ring">
      <svg id="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="4" width="20" height="16" rx="2"/>
        <path d="M22 4l-10 8L2 4"/>
      </svg>
    </div>

    <!-- Heading -->
    <h1 class="heading" id="heading">Check your email</h1>
    <p class="subtitle" id="subtitle">
      We sent a 6-digit code to <span class="email-hl">alex@budgetbook.co</span>
    </p>

    <!-- OTP boxes -->
    <div class="otp-row" id="otp-row">
      <input class="otp-box" type="text" inputmode="numeric" maxlength="1" data-i="0" aria-label="Digit 1" autocomplete="one-time-code">
      <input class="otp-box" type="text" inputmode="numeric" maxlength="1" data-i="1" aria-label="Digit 2">
      <input class="otp-box" type="text" inputmode="numeric" maxlength="1" data-i="2" aria-label="Digit 3">
      <input class="otp-box" type="text" inputmode="numeric" maxlength="1" data-i="3" aria-label="Digit 4">
      <input class="otp-box" type="text" inputmode="numeric" maxlength="1" data-i="4" aria-label="Digit 5">
      <input class="otp-box" type="text" inputmode="numeric" maxlength="1" data-i="5" aria-label="Digit 6">
    </div>

    <!-- Error message -->
    <div class="error-msg" id="error-msg">That code didn't work. Please check and try again.</div>

    <!-- Progress bar -->
    <div class="progress-bar" id="progress-bar">
      <div class="progress-bar-fill"></div>
    </div>

    <!-- Status -->
    <div class="status-text" id="status-text"></div>

    <!-- Resend -->
    <div class="resend" id="resend-row">
      Didn't get a code? <a id="resend-link" onclick="handleResend()">Resend</a>
    </div>

    <!-- Back -->
    <a href="#" class="back-link" id="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/>
      </svg>
      Back to sign in
    </a>

  </div>
</div>

<script>
  const boxes = document.querySelectorAll('.otp-box');
  const errorMsg = document.getElementById('error-msg');
  const progressBar = document.getElementById('progress-bar');
  const statusText = document.getElementById('status-text');
  const iconRing = document.getElementById('icon-ring');
  const successOverlay = document.getElementById('success-overlay');

  let isVerifying = false;

  // ── Focus first box on load ──
  setTimeout(() => boxes[0].focus(), 300);

  // ── Input handling ──
  boxes.forEach((box, i) => {
    box.addEventListener('input', (e) => {
      if (isVerifying) { e.target.value = ''; return; }

      const val = e.target.value.replace(/\D/g, '');
      box.value = val.slice(0, 1);
      clearError();
      updateFilled();

      if (val && i < 5) {
        boxes[i + 1].focus();
      }

      // Check if all 6 filled → auto-submit with magic delay
      const code = getCode();
      if (code.length === 6) {
        autoSubmit(code);
      }
    });

    box.addEventListener('keydown', (e) => {
      if (isVerifying) { e.preventDefault(); return; }

      if (e.key === 'Backspace') {
        if (!box.value && i > 0) {
          boxes[i - 1].focus();
          boxes[i - 1].value = '';
          updateFilled();
        }
      }
      // Arrow keys
      if (e.key === 'ArrowLeft' && i > 0) boxes[i - 1].focus();
      if (e.key === 'ArrowRight' && i < 5) boxes[i + 1].focus();
    });

    box.addEventListener('focus', () => {
      if (isVerifying) return;
      box.select();
    });

    // Paste support
    box.addEventListener('paste', (e) => {
      if (isVerifying) { e.preventDefault(); return; }

      e.preventDefault();
      const paste = (e.clipboardData.getData('text') || '').replace(/\D/g, '').slice(0, 6);
      paste.split('').forEach((ch, j) => {
        if (boxes[j]) boxes[j].value = ch;
      });
      clearError();
      updateFilled();
      if (paste.length > 0) {
        boxes[Math.min(paste.length, 5)].focus();
      }
      if (paste.length === 6) {
        autoSubmit(paste);
      }
    });
  });

  function getCode() {
    return Array.from(boxes).map(b => b.value).join('');
  }

  function updateFilled() {
    boxes.forEach(b => {
      b.classList.toggle('filled', b.value !== '');
      b.classList.remove('shake', 'verified');
    });
  }

  function clearError() {
    errorMsg.classList.remove('visible');
    boxes.forEach(b => b.classList.remove('shake'));
  }

  // ── Auto-submit with magical delay ──
  function autoSubmit(code) {
    if (isVerifying) return;
    isVerifying = true;

    // Brief pause so the user sees the last digit land
    setTimeout(() => {
      // Show verifying state
      statusText.textContent = 'Verifying…';
      statusText.className = 'status-text verifying';
      progressBar.classList.add('active');

      // Disable boxes visually
      boxes.forEach(b => {
        b.setAttribute('readonly', true);
        b.style.opacity = '0.7';
      });

      // Simulate verification (800ms feels responsive but "magical")
      setTimeout(() => {
        progressBar.classList.remove('active');

        // DEMO: "000000" is the only "wrong" code
        if (code === '000000') {
          handleError();
        } else {
          handleSuccess();
        }
      }, 900);
    }, 350);
  }

  // ── Error handling ──
  function handleError() {
    isVerifying = false;
    statusText.textContent = '';
    statusText.className = 'status-text';

    errorMsg.classList.add('visible');
    boxes.forEach(b => {
      b.classList.add('shake');
      b.removeAttribute('readonly');
      b.style.opacity = '1';
    });

    // Remove shake class after animation ends
    setTimeout(() => {
      boxes.forEach(b => b.classList.remove('shake'));
    }, 500);

    // Re-focus first box
    setTimeout(() => boxes[0].focus(), 100);
  }

  // ── Success handling ──
  function handleSuccess() {
    statusText.textContent = 'Verified!';
    statusText.className = 'status-text success-text';

    // Turn boxes green
    boxes.forEach((b, i) => {
      setTimeout(() => {
        b.classList.remove('filled');
        b.classList.add('verified');
        b.removeAttribute('readonly');
        b.style.opacity = '1';
      }, i * 50);
    });

    // Turn icon ring green
    iconRing.classList.add('success');
    iconRing.querySelector('svg').innerHTML = '<polyline points="20 6 9 17 4 12"/>';

    // After a beat, show the success overlay with checkmark animation
    setTimeout(() => {
      successOverlay.classList.add('show');
    }, 600);

    // Simulated redirect (just resets the demo)
    setTimeout(() => {
      resetDemo();
    }, 3800);
  }

  // ── Resend handler ──
  function handleResend() {
    const link = document.getElementById('resend-link');
    link.textContent = 'Sent!';
    link.style.pointerEvents = 'none';
    link.style.color = 'var(--income)';

    setTimeout(() => {
      link.textContent = 'Resend';
      link.style.pointerEvents = '';
      link.style.color = '';
    }, 2000);
  }

  // ── Reset for demo purposes ──
  function resetDemo() {
    isVerifying = false;
    successOverlay.classList.remove('show');
    iconRing.classList.remove('success');
    iconRing.querySelector('svg').innerHTML = '<rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 4l-10 8L2 4"/>';
    statusText.textContent = '';
    statusText.className = 'status-text';
    errorMsg.classList.remove('visible');
    progressBar.classList.remove('active');
    boxes.forEach(b => {
      b.value = '';
      b.className = 'otp-box';
      b.removeAttribute('readonly');
      b.style.opacity = '1';
    });
    setTimeout(() => boxes[0].focus(), 200);
  }
</script>

</body>
</html>
